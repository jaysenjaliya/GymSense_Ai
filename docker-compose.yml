# Local development orchestration: FastAPI backend + MongoDB.
# Frontend is run separately via Vite (npm run dev) and deployed to Vercel.
#
#   docker compose up --build
#
services:
  backend:
    build: ./backend
    container_name: gymsense-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override so the backend reaches the mongo *service* (not localhost).
      MONGO_URI: mongodb://mongo:27017
    volumes:
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mongo:
    image: mongo:7
    container_name: gymsense-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
