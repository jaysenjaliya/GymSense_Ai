# Local development orchestration: FastAPI backend + MongoDB.
# Frontend is run separately via Vite (npm run dev) and deployed to Vercel.
services:
  backend:
    build: ./backend
    container_name: gymsense-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - mongo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mongo:
    image: mongo:7
    container_name: gymsense-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
