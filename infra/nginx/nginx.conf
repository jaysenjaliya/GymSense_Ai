# Nginx reverse proxy for the GymSense backend on EC2.
# TLS termination is added by Certbot (Let's Encrypt) which rewrites this file
# with the 443 server block + cert paths. DuckDNS provides the dynamic hostname.

upstream gymsense_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;  # TODO: set DuckDNS hostname

    location / {
        proxy_pass http://gymsense_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
