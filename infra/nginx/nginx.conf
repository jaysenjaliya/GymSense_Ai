# Nginx reverse proxy for the GymSense backend on EC2.
# Place at /etc/nginx/sites-available/gymsense and symlink into sites-enabled.
#
# After the HTTP (port 80) block is live, run:
#     sudo certbot --nginx -d YOUR_SUBDOMAIN.duckdns.org
# Certbot injects the 443 server block + cert paths and sets up auto-renewal.

upstream gymsense_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name YOUR_SUBDOMAIN.duckdns.org;  # TODO: set your DuckDNS hostname

    # Session CSV uploads can be several MB (default Nginx limit is only 1 MB).
    client_max_body_size 25m;

    # Compress JSON API responses.
    gzip on;
    gzip_types application/json application/javascript text/plain;

    location / {
        proxy_pass http://gymsense_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ML inference + LLM calls can take a while — allow generous timeouts.
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

